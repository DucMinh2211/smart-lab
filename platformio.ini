[platformio]
default_envs = yolo_kit

[env:yolo_kit]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags = 
    -D LOG_LOCAL_LEVEL=ESP_LOG_DEBUG

[env:native]
platform = native
test_framework = unity
build_flags = 
    -D DESKTOP_APP
    -I include
